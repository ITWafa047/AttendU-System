<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="بوابة أعضاء هيئة التدريس - AttendU Dashboard">
    <meta name="keywords" content="AttendU, Dashboard, Faculty Portal, Attendance Management, Session Scheduling">
    <title>بوابة أعضاء هيئة التدريس</title>
    
    
    <link rel="shortcut icon" href="./assets/icons/icons8-attendance-96.png" type="image/x-icon"> 


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./assets/styles/master.css">

</head>

<body>
    <header class="d-flex justify-content-center align-items-center">
        <i class="fa-solid fa-graduation-cap display-1 text-danger ms-2"></i>
        <h1 class="fw-bold">AttendU System</h1>    
    </header>

        <section class="container d-flex flex-column justify-content-center align-items-center" style="height: 80vh;">
            <div class="card p-4 shadow" style="width: 400px;">
                <h2 class="text-center mb-4">تسجيل الدخول</h2>
                <form id="loginForm">

                <div class="mb-3">
                    <label for="username" class="form-label">اسم المستخدم</label>
                    <input type="text" class="form-control" id="username" placeholder="أدخل اسم المستخدم" required value="AttendU78">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">كلمة المرور</label>
                    <input type="password" class="form-control" id="password" placeholder="أدخل كلمة المرور" required value="b0ESC0OG4ikm">
                </div>

                <div class="mb-3">
                        <label for="inputRole" class="form-label">الدور</label>
                        <select name="role" id="inputRole" class="form-control">
                            <option value="instructor">عضو هيئة التدريس</option>
                            <option value="admin">مدير النظام</option>
                        </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">تسجيل الدخول</button>
            </div>
                </form>
        </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="main/authentication.js"></script>
</body>

</html>
