<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <section id="policy-section">
        <div class="shadow-sm p-3 mb-5 bg-body-tertiary rounded">
            <h2>سياسة الحضور للمقررات</h2>
            <p>هذا هو محتوى سياسة الحضور للمقررات.</p>
        </div>

        <div class="container">

            <div class="form">
                <fieldset class="border p-4">
                    <legend class="form-label">إعدادات سياسة الحضور</legend>
                    <div class="course-name my-3">
                        <label for="course-name-input" class="form-label">اسم المقرر:</label>
                        <input type="text" id="course-name-input" class="form-control" placeholder="أدخل اسم المقرر" />
                    </div>

                    <div class="session-type my-3">
                        <label for="session-type-select" class="form-label">نوع الجلسة:</label>
                        <select id="session-type-select" class="form-select">
                            <option selected>اختر نوع الجلسة</option>
                            <option value="lecture">محاضرة</option>
                            <option value="section">سكشن</option>
                            <option value="lab">معمل</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-4">
                            <div class="present-maximum my-3">
                                <label for="present-maximum-input" class="form-label">الحد الأقصى للحضور
                                    (بالدقائق):</label>
                                <input type="number" id="present-maximum-input" class="form-control"
                                    placeholder="أدخل الحد الأقصى للحضور" />
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="late-maximum my-3">
                                <label for="late-maximum-input" class="form-label">الحد الأقصى للتأخير
                                    (بالدقائق):</label>
                                <input type="number" id="late-maximum-input" class="form-control"
                                    placeholder="أدخل الحد الأقصى للتأخير" />
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="absent-maximum my-3">
                                <label for="absent-maximum-input" class="form-label">الحد الأقصى للغيابات المسموح
                                    بها</label>
                                <input type="number" id="absent-maximum-input" class="form-control"
                                    placeholder="أدخل الحد الأقصى للغيابات المسموح بها" />
                            </div>
                        </div>
                    </div>


                    <div class="instructor-name my-3">
                        <label for="instructor-name-input" class="form-label">اسم المحاضر / المعيد:</label>
                        <input type="text" id="instructor-name-input" class="form-control"
                            placeholder="أدخل اسم المحاضر / المعيد" />
                    </div>

                    <div class="class-type my-3">
                        <label for="class-type-select" class="form-label">الفرقة الدراسية:</label>
                        <select id="class-type-select" class="form-select">
                            <option selected>اختر اسم الفرقة الدراسية</option>
                            <option value="oneYear">الفرقة الاولي</option>
                            <option value="twoYear">الفرقة الثانية</option>
                            <option value="threeYear">الفرقة الثالثة</option>
                            <option value="fourYear">الفرقة الرابعة</option>
                        </select>
                    </div>

                    <div class="save-settings d-flex justify-content-center align-items-center mt-4">
                        <button class="btn btn-primary">حفظ الإعدادات</button>
                    </div>

                </fieldset>

            </div>

            <div class="filters mt-5">
                <div class="container">
                    <h2>فلترة النتائج</h2>
                </div>
                <div class="sessions-types" id="type-filter">
                    <button class="btn btn-outline-secondary active" data-type="all">الكل</button>
                    <button class="btn btn-outline-secondary" data-type="lecture">محاضرة</button>
                    <button class="btn btn-outline-secondary" data-type="section">سكشن</button>
                    <button class="btn btn-outline-secondary" data-type="lab">معمل</button>
                </div>

                <div class="search p-3" id="search-filter">
                    <input type="search" placeholder="ابحث عن اسم المقرر" class="form-control" />
                </div>


                <div class="row sessions-table">
                    <div class="col">
                        <table class="table table-bordered table-hover">
                            <thead>
                                <tr>
                                    <th scope="col">م</th>
                                    <th scope="col">اسم المقرر</th>
                                    <th scope="col">نوع الجلسة</th>
                                    <th scope="col">الفرقة الدراسية</th>
                                    <th scope="col">المحاضر/المعيد</th>
                                    <th scope="col">الحد الأقصى للحضور (بالدقائق)</th>
                                    <th scope="col">الحد الأقصى للتأخير (بالدقائق)</th>
                                    <th scope="col">الحد الأقصى للغيابات المسموح بها</th>
                                </tr>
                            </thead>
                            <tbody id="sessions-table-body">
                                <!-- سيتم ملء هذا الجزء ديناميكيًا باستخدام JavaScript -->
                                <!-- example row -->
                                <tr>
                                    <td>1</td>
                                    <td>البرمجة</td>
                                    <td>محاضرة</td>
                                    <td>الفرقة الأولى</td>
                                    <td>أحمد محمد</td>
                                    <td>120</td>
                                    <td>30</td>
                                    <td>5</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>


            </div>

    </section>
</body>

</html>
