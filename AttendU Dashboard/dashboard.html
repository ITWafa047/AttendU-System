<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="بوابة أعضاء هيئة التدريس - AttendU Dashboard">
    <title>الصفحة الرئيسية</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="shortcut icon" href="./assets/icons/icons8-attendance-96.png" type="image/x-icon" />

    <link rel="stylesheet" href="./assets/styles/master.css" />
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <img src="./assets/icons/icons8-attendance-96.png" alt="AttendU" class="logo" />
                    <h1 class="logo-text">AttendU</h1>
                </div>

                <button class="sidebar-toggle d-lg-none" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item" data-tab="overview">
                        <a href="#" class="nav-link" onclick="loadSection('overview')"
                            title="لمحة عامة عن الحضور والغياب والجلسات القادمة">
                            <i class="fas fa-home nav-icon"></i>
                            <span class="nav-text">لمحة عامة</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="liveSession">
                        <a href="#" class="nav-link" onclick="loadSection('liveSession')"
                            title="تسجيل الجلسات من خلال webcam">
                            <i class="fas fa-video nav-icon"></i>
                            <span class="nav-text">الجلسات المباشرة</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="schedules">
                        <a href="#" class="nav-link" onclick="loadSection('schedules')"
                            title="انشاء جداول الجلسات للمقررات الدراسية">
                            <i class="fas fa-calendar-alt nav-icon"></i>
                            <span class="nav-text">جداول الجلسات</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="sessions">
                        <a href="#" class="nav-link" onclick="loadSection('sessions')"
                            title="عرض معلومات الجلسات السابقة والحالية">
                            <i class="fas fa-list nav-icon"></i>
                            <span class="nav-text">معلومات الجلسات</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="students">
                        <a href="#" class="nav-link" onclick="loadSection('students')"
                            title="إدارة معلومات الطلاب وتحديثها">
                            <i class="fas fa-users nav-icon"></i>
                            <span class="nav-text">إدارة الطلاب</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="reports">
                        <a href="#" class="nav-link" onclick="loadSection('reports')"
                            title="عرض وتحليل بيانات الحضور والغياب">
                            <i class="fas fa-chart-line nav-icon"></i>
                            <span class="nav-text">البيانات والتقارير</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="policy">
                        <a href="#" class="nav-link" onclick="loadSection('policy')"
                            title="تحديد قواعد الحضور والغياب للمقررات الدراسية">
                            <i class="fas fa-clipboard-list nav-icon"></i>
                            <span class="nav-text">سياسة الحضور</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="warnings">
                        <a href="#" class="nav-link" onclick="loadSection('warnings')"
                            title="عرض التحذيرات المتعلقة بالحضور والغياب">
                            <i class="fas fa-exclamation-triangle nav-icon"></i>
                            <span class="nav-text">التحذيرات</span>
                        </a>
                    </li>

                    <li class="nav-item" data-tab="sync">
                        <a href="#" class="nav-link" onclick="loadSection('sync')"
                            title="مزامنة البيانات مع النظام المركزي للجامعة">
                            <i class="fas fa-sync-alt nav-icon"></i>
                            <span class="nav-text">مزامنة البيانات</span>
                        </a>
                    </li>
                </ul>

                <div class="sidebar-divider"></div>

                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#" class="nav-link" id="logoutBtn" title="تسجيل الخروج من النظام">
                            <i class="fas fa-sign-out-alt nav-icon"></i>
                            <span class="nav-text">تسجيل الخروج</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle d-lg-none" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <label for="roleSelect">الدور:</label>
                    <select id="roleSelect" class="form-control">
                        <option value="instructor">عضو هيئة التدريس</option>
                        <option value="admin" selected>مدير النظام</option>
                    </select>
                </div>

                <div class=" datetime alert alert-primary m-5" role="alert">
                    <span id="current-datetime">.....</span>
                </div>
            </header>

            <div class="content-wrapper" id="contentWrapper">
                <!-- Content loads here -->
            </div>
        </main>
    </div>

    <!-- Basic Dashboard JS -->
    <script src="./main/load_sections.js"></script>
    <script src="./main/sidebar.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Main JS Sections -->
    <script src="./main/js/live_sessions.js"></script>
    <script src="./main/js/attend_policy.js"></script>
    <script src="./main/js/data&reports.js"></script>
    <script src="./main/js/Overview.js"></script>
    <script src="./main/js/sessions_info.js"></script>
    <script src="./main/js/sessions_schedules.js"></script>
    <script src="./main/js/students_management.js"></script>
    <script src="./main/js/sync_data.js"></script>
    <script src="./main/js/warnings.js"></script>
    
</body>

</html>
